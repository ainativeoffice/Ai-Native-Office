kind = "web"
previewPath = "/"
title = "The AI-Native Office"
version = "1.0.0"
id = "artifacts/ai-native-office"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20280

[services.development]
run = "pnpm --filter @workspace/ai-native-office run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-native-office", "run", "build" ]
publicDir = "artifacts/ai-native-office/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20280"
BASE_PATH = "/"
